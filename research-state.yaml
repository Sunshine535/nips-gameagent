    statement: "GRPO self-play across diverse games improves strategic reasoning (ARC, StrategyQA, BBH)"
    status: untested
    priority: high

  H2_nash_dpo_alignment:
    statement: "Nash-DPO with asymmetric agents achieves Pareto-optimal multi-objective alignment"
    status: untested
    priority: high

  H3_cross_game_transfer:
    statement: "Training on diverse games transfers better than single-game specialization"
    status: untested
    priority: high

  H4_complementarity:
    statement: "GRPO and Nash-DPO produce orthogonal improvements — combining both is best"
    status: untested
    priority: medium

  H5_emergent_behavior:
    statement: "Nash-DPO agents develop emergent strategic cooperation (yielding, specialization)"
    status: untested
    priority: medium

